<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>口味选择 - 吃什么</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
            background: #FFFFFF;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            color: #1A1A1A;
            padding-bottom: 100px;
        }
        .status-bar { height: 47px; background: #FFFFFF; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .status-bar-time { font-size: 15px; font-weight: 600; }
        .status-icons { display: flex; gap: 4px; }
        .status-icons svg { width: 18px; height: 12px; }
        .progress-container { display: flex; flex-direction: column; align-items: center; padding: 32px 0 24px; }
        .progress-dots { display: flex; gap: 12px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #CCCCCC; background: transparent; }
        .dot.completed { background: #8B9A6D; border-color: #8B9A6D; }
        .dot.active { background: #8B9A6D; border-color: #8B9A6D; }
        .progress-label { font-size: 12px; color: #86868B; margin-top: 8px; }
        .skip-btn { position: absolute; top: 56px; right: 24px; font-size: 15px; color: #999999; background: none; border: none; cursor: pointer; }
        .title-area { text-align: center; padding: 0 24px 32px; }
        .page-title { font-size: 28px; font-weight: 700; color: #1A1A1A; margin-bottom: 8px; }
        .page-subtitle { font-size: 15px; color: #86868B; }
        .cuisine-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 0 24px; }
        .cuisine-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .cuisine-icon { width: 64px; height: 64px; border-radius: 16px; background: #F5F5F7; display: flex; align-items: center; justify-content: center; font-size: 28px; transition: all 0.2s; }
        .cuisine-item.selected .cuisine-icon { background: rgba(139,154,109,0.15); border: 2px solid #8B9A6D; }
        .cuisine-name { font-size: 13px; color: #1A1A1A; }
        .cuisine-item.selected .cuisine-name { color: #8B9A6D; font-weight: 600; }
        .bottom-area { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; padding: 16px 24px 34px; background: #FFFFFF; }
        .btn-primary { width: 100%; padding: 16px; background: #8B9A6D; color: #FFFFFF; border: none; border-radius: 16px; font-size: 17px; font-weight: 600; cursor: pointer; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn-primary:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="status-bar"><span class="status-bar-time">9:41</span><div class="status-icons"><svg viewBox="0 0 18 12" fill="none" stroke="#1A1A1A" stroke-width="1.5"><rect x="1" y="4" width="4" height="6" rx="1"/><rect x="7" y="2" width="4" height="8" rx="1"/><rect x="13" y="0" width="4" height="10" rx="1"/></svg></div></div>
    <div class="progress-container">
        <div class="progress-dots"><div class="dot completed"></div><div class="dot active"></div><div class="dot"></div></div>
        <div class="progress-label">2/3</div>
    </div>
    <button class="skip-btn">跳过</button>
    <div class="title-area"><h1 class="page-title">选择你的口味</h1><p class="page-subtitle">可多选，我们会为你推荐更合适的菜品</p></div>
    <div class="cuisine-grid">
        <div class="cuisine-item selected"><div class="cuisine-icon">🍜</div><span class="cuisine-name">中餐</span></div>
        <div class="cuisine-item"><div class="cuisine-icon">🍣</div><span class="cuisine-name">日料</span></div>
        <div class="cuisine-item"><div class="cuisine-icon">🥘</div><span class="cuisine-name">韩餐</span></div>
        <div class="cuisine-item"><div class="cuisine-icon">🍛</div><span class="cuisine-name">泰餐</span></div>
        <div class="cuisine-item"><div class="cuisine-icon">🍕</div><span class="cuisine-name">意餐</span></div>
        <div class="cuisine-item"><div class="cuisine-icon">🥐</div><span class="cuisine-name">法餐</span></div>
        <div class="cuisine-item"><div class="cuisine-icon">🍔</div><span class="cuisine-name">美式</span></div>
        <div class="cuisine-item"><div class="cuisine-icon">🍛</div><span class="cuisine-name">印度</span></div>
    </div>
    <div class="bottom-area"><button class="btn-primary">下一步</button></div>
</body>
</html>
