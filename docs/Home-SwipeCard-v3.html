<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>吃什么 - 首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', sans-serif;
            background: #FFFFFF;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            color: #1D1D1F;
            -webkit-font-smoothing: antialiased;
        }

        /* Status Bar */
        .status-bar {
            height: 47px;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        .status-bar-time { font-size: 15px; font-weight: 600; }
        .status-icons { display: flex; gap: 6px; font-size: 14px; }

        /* Header */
        .header {
            padding: 0 24px 32px;
            background: #FFFFFF;
        }
        .header-title {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header-subtitle {
            font-size: 17px;
            color: #86868B;
            margin-top: 4px;
        }

        /* Card Container */
        .card-container {
            padding: 0 24px;
        }
        .swipe-card {
            background: #FFFFFF;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .card-image {
            width: 100%;
            height: 360px;
            object-fit: cover;
            display: block;
        }
        .card-content {
            padding: 24px;
        }
        .card-title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }
        .card-subtitle {
            font-size: 17px;
            color: #86868B;
            margin-bottom: 16px;
        }
        .card-tags {
            display: flex;
            gap: 8px;
        }
        .tag {
            font-size: 12px;
            font-weight: 500;
            color: #7CB97D;
            background: rgba(124, 185, 125, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
        }

        /* Action Buttons */
        .actions {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding: 32px 0;
        }
        .action-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: #FFFFFF;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .action-btn:active { transform: scale(0.96); }
        .action-icon {
            width: 28px;
            height: 28px;
        }
        .action-btn.like {
            background: #7CB97D;
            box-shadow: 0 4px 16px rgba(124, 185, 125, 0.35);
        }
        .action-btn.like .action-icon { color: #FFFFFF; }

        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            height: 83px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid #E5E5EA;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 12px;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #86868B;
            font-size: 10px;
            font-weight: 500;
        }
        .tab-item.active { color: #7CB97D; }
        .tab-icon {
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span class="status-bar-time">9:41</span>
        <div class="status-icons">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><path d="M1 4.5C1 3.67 1.67 3 2.5 3H4.5C5.33 3 6 3.67 6 4.5V10.5C6 11.33 5.33 12 4.5 12H2.5C1.67 12 1 11.33 1 10.5V4.5ZM7 2.5C7 1.67 7.67 1 8.5 1H9.5C10.33 1 11 1.67 11 2.5V10.5C11 11.33 10.33 12 9.5 12H8.5C7.67 12 7 11.33 7 10.5V2.5ZM12 0.5C12 1.33 12.67 2 13.5 2H15.5C16.33 2 17 1.33 17 0.5V0.5C17 0.22 16.78 0 16.5 0H14.5C14.22 0 14 0.22 14 0.5V0.5Z" stroke="#1D1D1F" stroke-width="1.5" fill="none"/></svg>
        </div>
    </div>

    <div class="header">
        <h1 class="header-title">今天吃什么</h1>
        <p class="header-subtitle">让AI帮你做决定</p>
    </div>

    <div class="card-container">
        <div class="swipe-card">
            <img class="card-image" src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800&q=90" alt="沙拉">
            <div class="card-content">
                <h2 class="card-title">凯撒沙拉</h2>
                <p class="card-subtitle">轻食主义 · 经典选择</p>
                <div class="card-tags">
                    <span class="tag">350 kcal</span>
                    <span class="tag">高蛋白</span>
                </div>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="action-btn">
            <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="#86868B" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button class="action-btn like">
            <svg class="action-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </button>
        <button class="action-btn">
            <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="#F4A261" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </button>
    </div>

    <div class="tab-bar">
        <div class="tab-item active">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>首页</span>
        </div>
        <div class="tab-item">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>发现</span>
        </div>
        <div class="tab-item">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>我的</span>
        </div>
    </div>
</body>
</html>
