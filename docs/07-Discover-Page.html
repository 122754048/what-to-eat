<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发现 - 吃什么</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif; background: #F5F5F7; max-width: 430px; margin: 0 auto; min-height: 100vh; padding-bottom: 100px; color: #1A1A1A; }
        .header { background: #FFFFFF; padding: 16px 24px; }
        .page-title { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
        .section { padding: 24px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .section-title { font-size: 20px; font-weight: 600; }
        .section-more { font-size: 15px; color: #86868B; }
        .horizontal-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        .food-card-h { min-width: 140px; background: #FFFFFF; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .food-card-h img { width: 100%; height: 100px; object-fit: cover; }
        .food-card-h .info { padding: 12px; }
        .food-card-h .name { font-size: 14px; font-weight: 500; color: #1A1A1A; margin-bottom: 4px; }
        .food-card-h .meta { font-size: 12px; color: #86868B; }
        .food-card-h .tag { display: inline-block; background: rgba(139,154,109,0.1); color: #8B9A6D; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-top: 4px; }
        .vertical-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .food-card-v { background: #FFFFFF; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .food-card-v img { width: 100%; height: 120px; object-fit: cover; }
        .food-card-v .info { padding: 12px; }
        .food-card-v .name { font-size: 15px; font-weight: 500; color: #1A1A1A; margin-bottom: 6px; }
        .food-card-v .bottom { display: flex; justify-content: space-between; align-items: center; }
        .food-card-v .cal { font-size: 12px; color: #86868B; }
        .food-card-v .tag { background: rgba(244,162,97,0.1); color: #F4A261; padding: 2px 6px; border-radius: 4px; font-size: 10px; }
        .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; height: 83px; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 0.5px solid rgba(0,0,0,0.08); display: flex; justify-content: space-around; padding-top: 12px; }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #86868B; font-size: 10px; font-weight: 500; }
        .tab-item.active { color: #8B9A6D; }
    </style>
</head>
<body>
    <div class="header"><h1 class="page-title">发现</h1></div>
    <div class="section">
        <div class="section-header"><span class="section-title">🔥 本周热门</span><span class="section-more">查看更多 ›</span></div>
        <div class="horizontal-scroll">
            <div class="food-card-h"><img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300" alt=""><div class="info"><div class="name">凯撒沙拉</div><div class="meta">350 kcal</div><span class="tag">热门</span></div></div>
            <div class="food-card-h"><img src="https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=300" alt=""><div class="info"><div class="name">日式煎饼</div><div class="meta">420 kcal</div><span class="tag">热门</span></div></div>
            <div class="food-card-h"><img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=300" alt=""><div class="info"><div class="name">芒果沙拉</div><div class="meta">280 kcal</div><span class="tag">新品</span></div></div>
        </div>
    </div>
    <div class="section">
        <div class="section-header"><span class="section-title">🍃 应季推荐</span><span class="section-more">查看更多 ›</span></div>
        <div class="vertical-grid">
            <div class="food-card-v"><img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=300" alt=""><div class="info"><div class="name">牛油果沙拉</div><div class="bottom"><span class="cal">320 kcal</span><span class="tag">应季</span></div></div></div>
            <div class="food-card-v"><img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=300" alt=""><div class="info"><div class="name">南瓜浓汤</div><div class="bottom"><span class="cal">180 kcal</span><span class="tag">暖胃</span></div></div></div>
        </div>
    </div>
    <div class="tab-bar">
        <div class="tab-item"><span>🏠</span><span>首页</span></div>
        <div class="tab-item active"><span>🔍</span><span>发现</span></div>
        <div class="tab-item"><span>🍜</span><span>菜系</span></div>
        <div class="tab-item"><span>❤️</span><span>收藏</span></div>
        <div class="tab-item"><span>👤</span><span>我的</span></div>
    </div>
</body>
</html>
