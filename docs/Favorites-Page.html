<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的收藏 - 吃什么</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', sans-serif;
            background: #F8F8F8;
            max-width: 430px;
            margin: 0 auto;
            padding-bottom: 100px;
        }
        .header {
            background: white;
            padding: 50px 16px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn { font-size: 24px; color: #2D2D2D; }
        .page-title {
            font-size: 17px;
            font-weight: 600;
            color: #2D2D2D;
        }
        .empty-state {
            text-align: center;
            padding: 100px 40px;
        }
        .empty-icon { font-size: 64px; margin-bottom: 20px; }
        .empty-title {
            font-size: 18px;
            font-weight: 600;
            color: #2D2D2D;
            margin-bottom: 8px;
        }
        .empty-desc {
            font-size: 14px;
            color: #8E8E93;
            line-height: 1.5;
        }
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            height: 83px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid #E5E5E5;
            display: flex;
            justify-content: space-around;
            padding-top: 8px;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #8E8E93;
            font-size: 10px;
        }
        .tab-item.active { color: #7CB97D; }
        .tab-icon { font-size: 24px; }
    </style>
</head>
<body>
    <div class="header">
        <span class="back-btn">‹</span>
        <span class="page-title">我的收藏</span>
    </div>
    
    <div class="empty-state">
        <div class="empty-icon">❤️</div>
        <div class="empty-title">还没有收藏</div>
        <div class="empty-desc">滑动卡片时点击心形按钮<br>即可收藏你喜欢的菜品</div>
    </div>
    
    <div class="tab-bar">
        <div class="tab-item">
            <span class="tab-icon">🏠</span>
            <span>首页</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">🔍</span>
            <span>发现</span>
        </div>
        <div class="tab-item active">
            <span class="tab-icon">👤</span>
            <span>我的</span>
        </div>
    </div>
</body>
</html>
