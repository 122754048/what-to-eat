<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首页 - 吃什么</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif; background: #FFFFFF; max-width: 430px; margin: 0 auto; min-height: 100vh; color: #1A1A1A; }
        .status-bar { height: 47px; background: #FFFFFF; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .status-bar-time { font-size: 15px; font-weight: 600; }
        .status-icons { display: flex; gap: 4px; }
        .header { padding: 0 24px 24px; background: #FFFFFF; }
        .header-title { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
        .header-subtitle { font-size: 17px; color: #86868B; margin-top: 4px; }
        .card-container { padding: 0 24px; }
        .swipe-card { background: #FFFFFF; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .card-image { width: 100%; height: 360px; object-fit: cover; display: block; }
        .card-content { padding: 24px; }
        .card-title { font-size: 24px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 8px; }
        .card-subtitle { font-size: 17px; color: #86868B; margin-bottom: 16px; }
        .card-tags { display: flex; gap: 8px; }
        .tag { font-size: 12px; font-weight: 500; color: #8B9A6D; background: rgba(139,154,109,0.1); padding: 6px 14px; border-radius: 20px; }
        .actions { display: flex; justify-content: center; gap: 24px; padding: 32px 0; }
        .action-btn { width: 64px; height: 64px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); background: #FFFFFF; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .action-btn:active { transform: scale(0.96); }
        .action-btn.like { background: #8B9A6D; box-shadow: 0 4px 16px rgba(139,154,109,0.35); }
        .action-icon { width: 28px; height: 28px; }
        .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; height: 83px; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 0.5px solid rgba(0,0,0,0.08); display: flex; justify-content: space-around; align-items: flex-start; padding-top: 12px; }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #86868B; font-size: 10px; font-weight: 500; }
        .tab-item.active { color: #8B9A6D; }
        .tab-icon { width: 24px; height: 24px; }
    </style>
</head>
<body>
    <div class="status-bar"><span class="status-bar-time">9:41</span><div class="status-icons"><svg width="18" height="12" viewBox="0 0 18 12" fill="none" stroke="#1A1A1A" stroke-width="1.5"><rect x="1" y="4" width="4" height="6" rx="1"/><rect x="7" y="2" width="4" height="8" rx="1"/><rect x="13" y="0" width="4" height="10" rx="1"/></svg></div></div>
    <div class="header"><h1 class="header-title">今天吃什么</h1><p class="header-subtitle">让AI帮你做决定</p></div>
    <div class="card-container">
        <div class="swipe-card">
            <img class="card-image" src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800&q=90" alt="沙拉">
            <div class="card-content">
                <h2 class="card-title">凯撒沙拉</h2>
                <p class="card-subtitle">轻食主义 · 经典选择</p>
                <div class="card-tags"><span class="tag">350 kcal</span><span class="tag">高蛋白</span></div>
            </div>
        </div>
    </div>
    <div class="actions">
        <button class="action-btn"><svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="#86868B" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        <button class="action-btn like"><svg class="action-icon" viewBox="0 0 24 24" fill="white"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>
        <button class="action-btn"><svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="#F4A261" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></button>
    </div>
    <div class="tab-bar">
        <div class="tab-item active"><svg class="tab-icon" viewBox="0 0 24 24" fill="#8B9A6D"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>首页</span></div>
        <div class="tab-item"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="#86868B" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>发现</span></div>
        <div class="tab-item"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="#86868B" stroke-width="1.5"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg><span>菜系</span></div>
        <div class="tab-item"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="#86868B" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>收藏</span></div>
        <div class="tab-item"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="#86868B" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span></div>
    </div>
</body>
</html>
