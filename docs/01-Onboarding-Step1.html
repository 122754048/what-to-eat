<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>欢迎 - 吃什么</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', sans-serif;
            background: #FFFFFF;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            color: #1A1A1A;
        }
        .status-bar {
            height: 47px;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        .status-bar-time { font-size: 15px; font-weight: 600; }
        .status-icons { display: flex; gap: 4px; }
        .status-icons svg { width: 18px; height: 12px; }
        .progress-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 0 24px;
        }
        .progress-dots { display: flex; gap: 12px; }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid #CCCCCC;
            background: transparent;
        }
        .dot.active { background: #8B9A6D; border-color: #8B9A6D; }
        .progress-label { font-size: 12px; color: #86868B; margin-top: 8px; }
        .skip-btn {
            position: absolute;
            top: 56px;
            right: 24px;
            font-size: 15px;
            color: #999999;
            background: none;
            border: none;
            cursor: pointer;
        }
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px;
            text-align: center;
        }
        .illustration {
            width: 200px;
            height: 200px;
            margin-bottom: 40px;
        }
        .illustration svg { width: 100%; height: 100%; }
        .title {
            font-size: 28px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 16px;
        }
        .subtitle {
            font-size: 17px;
            color: #86868B;
            line-height: 1.6;
            margin-bottom: 48px;
        }
        .bottom-area {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            padding: 16px 24px 34px;
            background: #FFFFFF;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #F4A261;
            color: #FFFFFF;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-primary:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="status-bar">
        <span class="status-bar-time">9:41</span>
        <div class="status-icons">
            <svg viewBox="0 0 18 12" fill="none" stroke="#1A1A1A" stroke-width="1.5"><rect x="1" y="4" width="4" height="6" rx="1"/><rect x="7" y="2" width="4" height="8" rx="1"/><rect x="13" y="0" width="4" height="10" rx="1"/></svg>
        </div>
    </div>
    <div class="progress-container">
        <div class="progress-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="progress-label">1/3</div>
    </div>
    <button class="skip-btn">跳过</button>
    <div class="content">
        <div class="illustration">
            <svg viewBox="0 0 200 200" fill="none">
                <circle cx="100" cy="100" r="90" fill="#F5F5F7"/>
                <path d="M70 85c0-16.569 13.431-30 30-30s30 13.431 30 30" stroke="#8B9A6D" stroke-width="4" stroke-linecap="round"/>
                <path d="M60 100h80M60 120h60" stroke="#8B9A6D" stroke-width="4" stroke-linecap="round"/>
                <circle cx="100" cy="100" r="12" fill="#8B9A6D"/>
            </svg>
        </div>
        <h1 class="title">欢迎使用吃什么</h1>
        <p class="subtitle">让AI帮你决定今天吃什么<br>再也不用纠结了</p>
    </div>
    <div class="bottom-area">
        <button class="btn-primary">开始探索</button>
    </div>
</body>
</html>
