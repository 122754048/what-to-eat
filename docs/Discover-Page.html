<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发现 - 吃什么</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', sans-serif;
            background: #F8F8F8;
            max-width: 430px;
            margin: 0 auto;
            padding-bottom: 100px;
        }
        .header {
            background: white;
            padding: 50px 16px 16px;
        }
        .page-title {
            font-size: 34px;
            font-weight: 700;
            color: #2D2D2D;
        }
        .section {
            padding: 24px 16px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #2D2D2D;
        }
        .section-more {
            font-size: 14px;
            color: #8E8E93;
        }
        .horizontal-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        .food-card-h {
            min-width: 140px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .food-card-h img {
            width: 100%;
            height: 100px;
            object-fit: cover;
        }
        .food-card-h .info {
            padding: 10px;
        }
        .food-card-h .name {
            font-size: 14px;
            font-weight: 500;
            color: #2D2D2D;
            margin-bottom: 4px;
        }
        .food-card-h .meta {
            font-size: 12px;
            color: #8E8E93;
        }
        .food-card-h .tag {
            display: inline-block;
            background: #E8F8EB;
            color: #7CB97D;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-top: 4px;
        }
        .vertical-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .food-card-v {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .food-card-v img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
        .food-card-v .info {
            padding: 12px;
        }
        .food-card-v .name {
            font-size: 15px;
            font-weight: 500;
            color: #2D2D2D;
            margin-bottom: 6px;
        }
        .food-card-v .bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .food-card-v .cal {
            font-size: 12px;
            color: #8E8E93;
        }
        .food-card-v .tag {
            background: #FFF4E8;
            color: #F4A261;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
        }
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            height: 83px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid #E5E5E5;
            display: flex;
            justify-content: space-around;
            padding-top: 8px;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #8E8E93;
            font-size: 10px;
        }
        .tab-item.active { color: #7CB97D; }
        .tab-icon { font-size: 24px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="page-title">发现</h1>
    </div>
    
    <div class="section">
        <div class="section-header">
            <span class="section-title">🔥 本周热门</span>
            <span class="section-more">查看更多 ›</span>
        </div>
        <div class="horizontal-scroll">
            <div class="food-card-h">
                <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300" alt="沙拉">
                <div class="info">
                    <div class="name">凯撒沙拉</div>
                    <div class="meta">350 kcal</div>
                    <span class="tag">热门</span>
                </div>
            </div>
            <div class="food-card-h">
                <img src="https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=300" alt="煎饼">
                <div class="info">
                    <div class="name">日式煎饼</div>
                    <div class="meta">420 kcal</div>
                    <span class="tag">热门</span>
                </div>
            </div>
            <div class="food-card-h">
                <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=300" alt="沙拉">
                <div class="info">
                    <div class="name">芒果沙拉</div>
                    <div class="meta">280 kcal</div>
                    <span class="tag">新品</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="section">
        <div class="section-header">
            <span class="section-title">🍃 应季推荐</span>
            <span class="section-more">查看更多 ›</span>
        </div>
        <div class="vertical-grid">
            <div class="food-card-v">
                <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=300" alt="沙拉">
                <div class="info">
                    <div class="name">牛油果沙拉</div>
                    <div class="bottom">
                        <span class="cal">320 kcal</span>
                        <span class="tag">应季</span>
                    </div>
                </div>
            </div>
            <div class="food-card-v">
                <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=300" alt="汤">
                <div class="info">
                    <div class="name">南瓜浓汤</div>
                    <div class="bottom">
                        <span class="cal">180 kcal</span>
                        <span class="tag">暖胃</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="section">
        <div class="section-header">
            <span class="section-title">✨ 新菜上架</span>
            <span class="section-more">查看更多 ›</span>
        </div>
        <div class="horizontal-scroll">
            <div class="food-card-h">
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=300" alt="披萨">
                <div class="info">
                    <div class="name">玛格丽特披萨</div>
                    <div class="meta">520 kcal</div>
                    <span class="tag">新品</span>
                </div>
            </div>
            <div class="food-card-h">
                <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=300" alt="烤肉">
                <div class="info">
                    <div class="name">韩式烤肉</div>
                    <div class="meta">580 kcal</div>
                    <span class="tag">新品</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="tab-bar">
        <div class="tab-item">
            <span class="tab-icon">🏠</span>
            <span>首页</span>
        </div>
        <div class="tab-item active">
            <span class="tab-icon">🔍</span>
            <span>发现</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">👤</span>
            <span>我的</span>
        </div>
    </div>
</body>
</html>
