<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>欢迎 - 吃什么</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', sans-serif;
            background: #FFFFFF;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            color: #1A1A1A;
        }

        /* Status Bar */
        .status-bar {
            height: 47px;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        .status-bar-time { font-size: 15px; font-weight: 600; }
        .status-icons { display: flex; gap: 4px; font-size: 14px; }

        /* Progress Indicator */
        .progress-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 0 24px;
        }
        .progress-dots {
            display: flex;
            gap: 12px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid #CCCCCC;
            background: transparent;
        }
        .dot.active {
            background: #8B9A6D;
            border-color: #8B9A6D;
        }
        .progress-label {
            font-size: 12px;
            color: #86868B;
            margin-top: 8px;
        }

        /* Skip Button */
        .skip-btn {
            position: absolute;
            top: 56px;
            right: 24px;
            font-size: 15px;
            color: #999999;
            background: none;
            border: none;
            cursor: pointer;
        }

        /* Content */
        .content {
            padding: 0 24px;
            text-align: center;
        }
        .illustration {
            width: 100%;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px 0;
        }
        .illustration svg {
            width: 200px;
            height: 200px;
        }
        .title {
            font-size: 28px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 16px;
        }
        .subtitle {
            font-size: 17px;
            color: #86868B;
            line-height: 1.5;
            margin-bottom: 48px;
        }

        /* Bottom Button */
        .bottom-area {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            padding: 16px 24px 34px;
            background: #FFFFFF;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #8B9A6D;
            color: #FFFFFF;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-primary:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="status-bar">
        <span class="status-bar-time">9:41</span>
        <div class="status-icons">📶 📡 🔋</div>
    </div>

    <div class="progress-container">
        <div class="progress-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="progress-label">1/3</div>
    </div>

    <button class="skip-btn">跳过</button>

    <div class="content">
        <div class="illustration">
            <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="100" cy="100" r="80" fill="#F5F5F7"/>
                <path d="M100 60C77.909 60 60 77.909 60 100C60 122.091 77.909 140 100 140C122.091 140 140 122.091 140 100C140 77.909 122.091 60 100 60ZM100 130C83.986 130 70 116.014 70 100C70 83.986 83.986 70 100 70C116.014 70 130 83.986 130 100C130 116.014 116.014 130 100 130Z" fill="#8B9A6D"/>
                <circle cx="100" cy="100" r="15" fill="#8B9A6D"/>
            </svg>
        </div>
        <h1 class="title">欢迎使用吃什么</h1>
        <p class="subtitle">让AI帮你决定今天吃什么<br>再也不用纠结了</p>
    </div>

    <div class="bottom-area">
        <button class="btn-primary">开始探索</button>
    </div>
</body>
</html>
