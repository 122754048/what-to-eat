<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>历史记录 - 吃什么</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', sans-serif;
            background: #F8F8F8;
            max-width: 430px;
            margin: 0 auto;
            padding-bottom: 100px;
        }
        .header {
            background: white;
            padding: 50px 16px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn { font-size: 24px; color: #2D2D2D; }
        .page-title { font-size: 17px; font-weight: 600; color: #2D2D2D; }
        .date-group { padding: 16px; }
        .date-label {
            font-size: 13px;
            color: #8E8E93;
            margin-bottom: 12px;
        }
        .history-card {
            background: white;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .history-card img {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            object-fit: cover;
        }
        .history-card .info {
            flex: 1;
        }
        .history-card .name {
            font-size: 16px;
            font-weight: 500;
            color: #2D2D2D;
            margin-bottom: 4px;
        }
        .history-card .meta {
            font-size: 13px;
            color: #8E8E93;
            margin-bottom: 8px;
        }
        .history-card .action {
            font-size: 12px;
            color: #7CB97D;
        }
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            height: 83px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid #E5E5E5;
            display: flex;
            justify-content: space-around;
            padding-top: 8px;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #8E8E93;
            font-size: 10px;
        }
        .tab-item.active { color: #7CB97D; }
        .tab-icon { font-size: 24px; }
    </style>
</head>
<body>
    <div class="header">
        <span class="back-btn">‹</span>
        <span class="page-title">历史记录</span>
    </div>
    
    <div class="date-group">
        <div class="date-label">今天</div>
        <div class="history-card">
            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200" alt="沙拉">
            <div class="info">
                <div class="name">凯撒沙拉</div>
                <div class="meta">12:30 · 350 kcal</div>
                <div class="action">再次查看 ›</div>
            </div>
        </div>
        <div class="history-card">
            <img src="https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=200" alt="煎饼">
            <div class="info">
                <div class="name">日式煎饼</div>
                <div class="meta">19:45 · 420 kcal</div>
                <div class="action">再次查看 ›</div>
            </div>
        </div>
    </div>
    
    <div class="date-group">
        <div class="date-label">昨天</div>
        <div class="history-card">
            <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=200" alt="沙拉">
            <div class="info">
                <div class="name">牛油果沙拉</div>
                <div class="meta">13:20 · 320 kcal</div>
                <div class="action">再次查看 ›</div>
            </div>
        </div>
    </div>
    
    <div class="tab-bar">
        <div class="tab-item"><span class="tab-icon">🏠</span><span>首页</span></div>
        <div class="tab-item"><span class="tab-icon">🔍</span><span>发现</span></div>
        <div class="tab-item active"><span class="tab-icon">👤</span><span>我的</span></div>
    </div>
</body>
</html>
