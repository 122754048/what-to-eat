<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的 - 吃什么</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif; background: #F5F5F7; max-width: 430px; margin: 0 auto; min-height: 100vh; padding-bottom: 100px; color: #1A1A1A; }
        .profile-header { background: linear-gradient(135deg, #8B9A6D, #A8B88A); padding: 60px 24px 40px; color: white; }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 36px; border: 3px solid rgba(255,255,255,0.5); }
        .user-name { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .member-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.25); padding: 4px 10px; border-radius: 12px; font-size: 12px; }
        .member-card { background: white; margin: -20px 16px 16px; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .member-card-title { font-size: 14px; color: #86868B; margin-bottom: 8px; }
        .member-card-content { display: flex; justify-content: space-between; align-items: center; }
        .member-status { font-size: 18px; font-weight: 600; color: #1A1A1A; }
        .member-expiry { font-size: 13px; color: #86868B; margin-top: 4px; }
        .member-cta { background: #8B9A6D; color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; }
        .menu-section { background: white; margin: 16px; border-radius: 16px; overflow: hidden; }
        .menu-item { display: flex; align-items: center; padding: 16px; border-bottom: 0.5px solid #F0F0F0; }
        .menu-item:last-child { border-bottom: none; }
        .menu-icon { width: 36px; height: 36px; border-radius: 10px; background: #F5F5F7; display: flex; align-items: center; justify-content: center; margin-right: 14px; font-size: 18px; }
        .menu-icon.red { background: #FFEBEB; }
        .menu-icon.blue { background: #E8F4FF; }
        .menu-icon.orange { background: #FFF4E8; }
        .menu-icon.green { background: #E8F8EB; }
        .menu-text { flex: 1; font-size: 16px; color: #1A1A1A; }
        .menu-arrow { color: #C7C7CC; font-size: 18px; }
        .logout-btn { display: block; margin: 24px 16px; padding: 14px; background: white; border-radius: 12px; text-align: center; color: #FF3B30; font-size: 16px; font-weight: 500; }
        .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; height: 83px; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 0.5px solid rgba(0,0,0,0.08); display: flex; justify-content: space-around; padding-top: 8px; }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #86868B; font-size: 10px; font-weight: 500; }
        .tab-item.active { color: #8B9A6D; }
    </style>
</head>
<body>
    <div class="profile-header">
        <div class="user-info">
            <div class="avatar">👤</div>
            <div class="user-details"><div class="user-name">小明</div><div class="member-badge">👑 Premium会员</div></div>
        </div>
    </div>
    <div class="member-card">
        <div class="member-card-title">会员状态</div>
        <div class="member-card-content">
            <div><div class="member-status">Premium 会员</div><div class="member-expiry">到期: 2026-12-31</div></div>
            <div class="member-cta">续费</div>
        </div>
    </div>
    <div class="menu-section">
        <div class="menu-item"><div class="menu-icon red">❤️</div><span class="menu-text">我的收藏</span><span class="menu-arrow">›</span></div>
        <div class="menu-item"><div class="menu-icon blue">🕐</div><span class="menu-text">历史记录</span><span class="menu-arrow">›</span></div>
        <div class="menu-item"><div class="menu-icon orange">⚙️</div><span class="menu-text">设置</span><span class="menu-arrow">›</span></div>
        <div class="menu-item"><div class="menu-icon green">❓</div><span class="menu-text">帮助与反馈</span><span class="menu-arrow">›</span></div>
    </div>
    <div class="logout-btn">退出登录</div>
    <div class="tab-bar">
        <div class="tab-item"><span>🏠</span><span>首页</span></div>
        <div class="tab-item"><span>🔍</span><span>发现</span></div>
        <div class="tab-item"><span>🍜</span><span>菜系</span></div>
        <div class="tab-item"><span>❤️</span><span>收藏</span></div>
        <div class="tab-item active"><span>👤</span><span>我的</span></div>
    </div>
</body>
</html>
