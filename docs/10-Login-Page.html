<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 吃什么</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif; background: #FFFFFF; max-width: 430px; margin: 0 auto; min-height: 100vh; color: #1A1A1A; }
        .logo-area { padding: 80px 0 60px; text-align: center; }
        .logo-icon { width: 80px; height: 80px; margin: 0 auto 16px; background: #8B9A6D; border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 48px; height: 48px; }
        .app-name { font-size: 28px; font-weight: 700; color: #1A1A1A; }
        .app-slogan { font-size: 14px; color: #86868B; margin-top: 8px; }
        .login-form { padding: 0 24px; }
        .input-field { width: 100%; padding: 14px 16px; border: 1.5px solid #E8E8E8; border-radius: 12px; font-size: 16px; outline: none; transition: border-color 0.2s; margin-bottom: 16px; }
        .input-field:focus { border-color: #8B9A6D; }
        .input-field::placeholder { color: #C7C7CC; }
        .login-btn { width: 100%; padding: 16px; background: #8B9A6D; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; margin-top: 24px; cursor: pointer; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .login-btn:active { transform: scale(0.96); }
        .divider { display: flex; align-items: center; margin: 32px 0; color: #C7C7CC; font-size: 13px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 0.5px; background: #E8E8E8; }
        .divider span { padding: 0 16px; }
        .social-login { display: flex; gap: 16px; justify-content: center; }
        .social-btn { width: 60px; height: 60px; border: 1px solid #E8E8E8; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: white; }
        .social-btn svg { width: 28px; height: 28px; }
        .footer-links { position: absolute; bottom: 40px; left: 0; right: 0; text-align: center; font-size: 13px; color: #86868B; }
        .footer-links a { color: #8B9A6D; text-decoration: none; }
    </style>
</head>
<body style="position: relative; padding-bottom: 100px;">
    <div class="logo-area">
        <div class="logo-icon">
            <svg viewBox="0 0 48 48" fill="none">
                <path d="M12 18h24v4H12zM12 26h24v4H12zM20 10h8v32h-8z" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="app-name">今天吃什么</div>
        <div class="app-slogan">让AI帮你决定今天吃什么</div>
    </div>
    <div class="login-form">
        <input type="tel" class="input-field" placeholder="请输入手机号">
        <input type="text" class="input-field" placeholder="请输入验证码">
        <button class="login-btn">登录 / 注册</button>
        <div class="divider"><span>或</span></div>
        <div class="social-login">
            <button class="social-btn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg></button>
            <button class="social-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#86868B" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg></button>
        </div>
    </div>
    <div class="footer-links">登录即表示同意 <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a></div>
</body>
</html>
